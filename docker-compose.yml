services:
  app:
    build: .
    image: trek-local:latest
    container_name: trek
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    labels:
      - traefik.enable=true
      - traefik.http.routers.trek.rule=Host(`trek.eltonlima.tech`)
      - traefik.http.routers.trek.entrypoints=websecure
      - traefik.http.routers.trek.tls.certresolver=letsencrypt
      - traefik.http.services.trek.loadbalancer.server.port=3000
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=https://trek.eltonlima.tech
      - APP_URL=https://trek.eltonlima.tech
      - FORCE_HTTPS=true
      - TRUST_PROXY=1
      - ALLOW_INTERNAL_NETWORK=false
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
